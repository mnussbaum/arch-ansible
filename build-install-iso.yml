# vim:ft=yaml.ansible:
---
- hosts: all
  tasks:
    - name: Create temp build dir
      tempfile:
        state: directory
        suffix: archiso-build
      register: iso_build_temp_dir

    - set_fact:
        iso_build_dir: "{{ iso_build_temp_dir.path }}"
        # iso_build_dir: "<HARD CODE HERE FOR DEBUGING>"
    - set_fact:
        airootfs: "{{ iso_build_dir }}/airootfs"
    - set_fact:
        root_user_dir: "{{ airootfs }}/root"
    - set_fact:
        pacman_db_dest_dir: "{{ root_user_dir }}/pacman_dbs"

    - block:
        - name: Populate temp dir
          synchronize:
            src: /usr/share/archiso/configs/releng/
            dest: "{{ iso_build_dir }}"
            perms: false

        - name: Ignore iptables-legacy to resolve libxtables provider conflict
          lineinfile:
            path: "{{ iso_build_dir }}/pacman.conf"
            regexp: '^#?IgnorePkg'
            line: 'IgnorePkg = iptables-legacy'

        - name: Create pacman DB directory
          file:
            path: "{{ pacman_db_dest_dir }}"
            state: directory
        - name: Add pacman DBs to allow pre-networking package presence checks
          copy:
            src: "/var/lib/pacman/sync/{{ item }}"
            dest: "{{ pacman_db_dest_dir }}/{{ item }}"
          loop:
            - core.db
            - extra.db

        - name: Install vconsole configuration
          import_tasks: tasks/vconsole.yml
          vars:
            vconsole_install_root: "{{ airootfs }}"
        - name: Install network configuration
          import_tasks: tasks/network_configuration.yml
          vars:
            network_install_root: "{{ airootfs }}"

        - name: Install files into root user dir
          import_tasks: tasks/bootstrapping/install-user-files.yml
          become: true
          vars:
            user_home_dir: "{{ root_user_dir }}"
            ansible_dest_dir: "{{ root_user_dir }}/arch-ansible"
            user_name: root

        - name: Add pacakges
          lineinfile:
            dest: "{{ iso_build_dir }}/packages.x86_64"
            line: "{{ item }}"
          loop: "{{ bootstrap_packages }}"

        - name: Set permissions for live environment
          lineinfile:
            dest: "{{ iso_build_dir }}/profiledef.sh"
            line: "{{ item }}"
            insertafter: 'file_permissions=\('
          loop:
            - '["/root/arch-ansible/"]="0:0:0644"'
            - '["/root/arch-ansible/bin/"]="0:0:0755"'

        - name: Write customize_airootfs.sh to configure live environment via ansible
          copy:
            dest: "{{ airootfs }}/root/customize_airootfs.sh"
            mode: "0755"
            content: |
              #!/bin/bash
              set -e

              # Wrap systemctl to skip start/stop/restart in chroot — enable/disable
              # still works so services come up correctly on first boot.
              mv /usr/bin/systemctl /usr/bin/systemctl.orig
              cat > /usr/bin/systemctl << 'EOF'
              #!/bin/bash
              case "${1:-}" in
                start|stop|restart|reload|try-restart|try-reload-or-restart|condrestart|force-reload)
                  echo "systemctl: skipping '$*' in chroot" >&2
                  exit 0
                  ;;
                *)
                  exec /usr/bin/systemctl.orig "$@"
                  ;;
              esac
              EOF
              chmod +x /usr/bin/systemctl

              # Pacman 6.1+ uses /proc/mounts for disk space and cachedir checks,
              # but /proc is bind-mounted from the host in the chroot so mount
              # point detection fails. Disable CheckSpace and redirect the cache
              # to a known tmpfs path to work around both issues.
              mkdir -p /tmp/pkg-cache
              sed -i '/^\[options\]/a CacheDir = /tmp/pkg-cache' /etc/pacman.conf
              sed -i 's/^CheckSpace/#CheckSpace/' /etc/pacman.conf

              pacman-key --init
              pacman-key --populate archlinux

              # The chroot work dir is on nosuid /tmp so sudo's setuid bit
              # doesn't work. We're already root, so delegate via runuser for
              # user switches and exec directly otherwise.
              mv /usr/bin/sudo /usr/bin/sudo.orig
              cat > /usr/bin/sudo << 'EOF'
              #!/bin/bash
              target_user=""
              while [[ $# -gt 0 ]]; do
                case "$1" in
                  -u) target_user="$2"; shift 2 ;;
                  -g|-C|-T|-p|-r|-t) shift 2 ;;
                  --) shift; break ;;
                  -*) shift ;;
                  *) break ;;
                esac
              done
              if [[ -n "$target_user" && "$target_user" != "root" ]]; then
                exec runuser -u "$target_user" -- "$@"
              else
                exec "$@"
              fi
              EOF
              chmod +x /usr/bin/sudo

              # Create a non-root user for AUR builds (makepkg refuses root).
              useradd -m aur_builder
              echo "aur_builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/aur_builder

              cd /root/arch-ansible
              HOSTNAME=install_media NO_ASK_BECOME_PASS=1 ./bin/ansible

              mv /usr/bin/systemctl.orig /usr/bin/systemctl

        - name: Build ISO
          become: true
          command: "mkarchiso -v -w {{ iso_build_dir }}/work -o {{ iso_build_dir }}/out {{ iso_build_dir }}"
          args:
            creates: "{{ iso_build_dir }}/out/*.iso"
            chdir: "{{ iso_build_dir }}"

        - name: Inspect built images
          register: built_images
          find:
            paths: "{{ iso_build_dir }}/out"
            patterns: "*.iso"

        - name: Fail if there isn't exactly one image found
          when: built_images.matched != 1
          fail:
            msg: "Incorrect image file count in {{ iso_build_dir }}/out"

        - name: Write out ISO file
          become: true
          command: "dd bs=4M if={{ item.path }} of={{ iso_output_file }} oflag=sync"
          loop: "{{ built_images.files }}"

      always:
        - name: Cleanup
          become: true
          file:
            path: "{{ iso_build_dir }}"
            state: absent

