# vim:ft=yaml.ansible:
---
- hosts: all
  tasks:
    - set_fact:
        user_home_dir: "/home/{{ user.name }}"
    - set_fact:
        arch_ansible_dest: "{{ user_home_dir }}/src/arch-ansible"
    - set_fact:
        mounted_arch_ansible_dest: "{{ partitions['root'].mount_point }}{{ arch_ansible_dest }}"

    - name: Clone arch-ansible repo
      git:
        repo: "{{ playbook_dir }}"
        dest: "{{ mounted_arch_ansible_dest }}"
        version: HEAD

    - name: Switch back into chroot to fix file permissions
      set_fact:
        ansible_host: /mnt
        ansible_connection: chroot

    - name: Remove group and other permissions on arch-ansible copy
      shell: "chmod -R go= {{ arch_ansible_dest | quote }}"

    - name: Set ownership on arch-ansible copy
      file:
        path: "{{ arch_ansible_dest }}"
        recurse: true
        owner: "{{ user.name }}"
        group: "{{ user.group }}"

    - name: Set ownership on password-store
      file:
        path: "/home/{{ user.name }}/.local/share/password-store"
        recurse: true
        owner: "{{ user.name }}"
        group: "{{ user.group }}"

    - name: Fix home directory ownership
      become: true
      file:
        path: "/home/{{ user.name }}"
        owner: "{{ user.name }}"
        group: "{{ user.group }}"
        recurse: true
        state: directory

    - name: Switch connection back to local for post-chroot tasks
      set_fact:
        ansible_host: "{{ original_hostname }}"
        ansible_connection: local
