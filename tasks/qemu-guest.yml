# vim:ft=yaml.ansible:
---
- name: qemu guest | Blacklist coretemp module
  become: true
  notify:
    - Regenerate mkinitcpio ramdisk
  copy:
    content: "blacklist coretemp"
    dest: "/etc/modprobe.d/blacklist_coretemp.conf"

- name: qemu guest | Install guest agent package
  package:
    state: present
    name: qemu-guest-agent
  become: true

- name: qemu guest | Enable qemu guest agent service
  service:
    name: qemu-guest-agent.service
    enabled: yes
    state: started
    daemon-reload: true
  become: true

- name: qemu guest | Mount virtfs shared directory
  become: true
  mount:
    path: /mnt/host_shared
    src: host_shared
    fstype: 9p
    opts: trans=virtio,version=9p2000.L,rw
    state: mounted
