# vim:ft=yaml.ansible:
---
- name: GPG | Install packages
  package:
    state: present
    name:
      - ccid
      - gnupg
      - imagemagick
      - paperkey
      - pcsclite
      - qrencode
      - yubikey-manager
      - zbar
  become: true

- name: GPG | Create config dir
  file:
    path: "{{ user_home_dir }}/.gnupg"
    owner: "{{ user.name }}"
    group: "{{ user.group }}"
    mode: 0700
    state: directory

- name: GPG | Install config
  copy:
    dest: "{{ user_home_dir }}/.gnupg/gpg.conf"
    src: files/gpg.conf
    owner: "{{ user.name }}"
    group: "{{ user.group }}"
    mode: 0600

- name: GPG | Install gpg-agent config
  copy:
    dest: "{{ user_home_dir }}/.gnupg/gpg-agent.conf"
    src: files/gpg-agent.conf
    owner: "{{ user.name }}"
    group: "{{ user.group }}"
    mode: 0600

- name: GPG | Install scdaemon config
  copy:
    dest: "{{ user_home_dir }}/.gnupg/scdaemon.conf"
    src: files/scdaemon.conf
    owner: "{{ user.name }}"
    group: "{{ user.group }}"
    mode: 0600

- name: GPG | Enable pcscd service
  become: true
  systemd:
    name: pcscd.service
    enabled: true
    state: started

- name: GPG | Add user to pcscd group for YubiKey USB access
  become: true
  user:
    name: "{{ user.name }}"
    groups: pcscd
    append: yes

- name: GPG | Find gpg-agent user service configs
  find:
    paths: "/usr/share/doc/gnupg/examples/systemd-user"
    excludes: "README"
    recurse: no
  changed_when: false
  register: gpg_agent_service_configs

- name: GPG | Install gpg-agent user service configs
  copy:
    dest: "{{ user_config_dir }}/systemd/user/{{ item.path | basename }}"
    src: "{{ item.path }}"
    owner: "{{ user.name }}"
    group: "{{ user.group }}"
  with_items: "{{ gpg_agent_service_configs.files }}"

- name: GPG | Check if GPG key is in keyring
  become: true
  become_user: "{{ user.name }}"
  command: gpg --list-keys "{{ user.gpg_key_uid }}"
  register: gpg_key_check
  failed_when: false
  changed_when: false

- name: GPG | Import public key
  become: true
  become_user: "{{ user.name }}"
  command: gpg --import
  args:
    stdin: "{{ lookup('file', 'files/gpg-pubkey.asc') }}"
  when: gpg_key_check.rc != 0

- name: GPG | Set ultimate trust on own key
  become: true
  become_user: "{{ user.name }}"
  shell: |
    fingerprint=$(gpg --list-keys --with-colons "{{ user.gpg_key_uid }}" | awk -F: '/^fpr/{print $10; exit}')
    [[ -n "$fingerprint" ]] && echo "$fingerprint:6:" | gpg --import-ownertrust || true
  args:
    executable: /bin/bash
  changed_when: false

- name: GPG | Register YubiKey SSH keygrips in sshcontrol
  become: true
  become_user: "{{ user.name }}"
  lineinfile:
    path: "{{ user_home_dir }}/.gnupg/sshcontrol"
    line: "{{ item }} 0"
    create: yes
  loop: "{{ gpg_auth_ssh_keygrips }}"

- name: GPG | Enable gpg-agent user services
  become: true
  become_user: "{{ user.name }}"
  systemd:
    enabled: true
    name: "{{ item.path | basename }}"
    scope: user
    daemon-reload: true
  with_items: "{{ gpg_agent_service_configs.files }}"

- name: GPG | Kill gpg daemons to release keybox SQLite connections
  become: true
  become_user: "{{ user.name }}"
  command: gpgconf --kill all
  failed_when: false
  changed_when: false

- name: GPG | Find stale lock files
  find:
    paths: "{{ user_home_dir }}/.gnupg"
    patterns:
      - "*.lock"
      - ".#*"
    hidden: true
  register: gpg_lock_files
  changed_when: false

- name: GPG | Remove stale lock files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ gpg_lock_files.files }}"
